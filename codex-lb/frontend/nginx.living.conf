server {
    listen 5173;
    root /usr/share/nginx/html;

    location /api/ {
        proxy_pass http://server:2455;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }

    location /v1/ { proxy_pass http://server:2455; proxy_buffering off; }
    location /backend-api/ { proxy_pass http://server:2455; proxy_buffering off; }
    location = /health { proxy_pass http://server:2455; }
    location / { try_files $uri $uri/ /index.html; }
}
