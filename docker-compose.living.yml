name: living-balancer

services:
  server:
    build:
      context: ./codex-lb
      dockerfile: Dockerfile
    env_file:
      - path: ./codex-lb/.env.local
        required: false
    environment:
      CODEX_LB_DASHBOARD_AUTH_MODE: disabled
      PYTHONPATH: /opt/tokdash
      TOKDASH_DATA_DIR: /var/lib/codex-lb/local-usage
      CODEX_HOME: /host-user/.codex
      CLAUDE_CONFIG_DIR: /host-user/.claude
      KIMI_SHARE_DIR: /host-user/.kimi
      PI_AGENT_DIR: /host-user/.pi/agent/sessions
      HERMES_HOME: /host-user/.hermes
      HOME: /host-user
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "2455", "--ws-max-size", "134217728"]
    ports:
      - "127.0.0.1:2455:2455"
      - "127.0.0.1:1455:1455"
    volumes:
      - living-codex-lb-data:/var/lib/codex-lb
      - ./codex-lb/app:/app/app
      - ./Tokdash/src:/opt/tokdash:ro
      - ${USERPROFILE}:/host-user:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./codex-lb/frontend
      dockerfile_inline: |
        FROM oven/bun:1.3.14-alpine AS build
        WORKDIR /app
        COPY package.json bun.lock ./
        RUN bun install --frozen-lockfile
        COPY . .
        RUN bun run build
        FROM nginx:1.29-alpine
        COPY nginx.living.conf /etc/nginx/conf.d/default.conf
        COPY --from=build /app/static /usr/share/nginx/html
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  living-codex-lb-data:
